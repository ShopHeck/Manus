<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRENDZ — E-Commerce Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Outfit', sans-serif;
  background: #1A1C1F;
  color: #F3F1ED;
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; opacity: 0.04;
  background-image:
    linear-gradient(135deg, #fff 25%, transparent 25%),
    linear-gradient(225deg, #fff 25%, transparent 25%),
    linear-gradient(45deg,  #fff 25%, transparent 25%),
    linear-gradient(315deg, #fff 25%, transparent 25%);
  background-size: 6px 6px;
  background-position: 0 0, 3px 0, 3px -3px, 0px 3px;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: #1A1C1F; }
::-webkit-scrollbar-thumb { background: #444A52; border-radius: 2px; }
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #C65D2E;
  animation: pulse 2s ease-in-out infinite;
}
.pulse-dot.green { background: #4CAF50; }
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.5; transform:scale(.75); }
}
.field-input {
  background: #1A1C1F;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: .625rem;
  padding: .65rem 1rem;
  color: #F3F1ED;
  font-size: .85rem;
  font-family: 'Outfit', sans-serif;
  width: 100%;
  transition: border-color .2s, box-shadow .2s;
}
.field-input:focus {
  outline: none;
  border-color: rgba(198,93,46,.5);
  box-shadow: 0 0 0 3px rgba(198,93,46,.1);
}
.field-input::placeholder { color: #555; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-up { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }
.d1 { animation-delay:.05s; } .d2 { animation-delay:.1s; }
.d3 { animation-delay:.15s; } .d4 { animation-delay:.2s; }
.d5 { animation-delay:.25s; }
@keyframes shimmer {
  0%  { background-position:-400px 0; }
  100%{ background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg,#24272B 0%,#2E3237 50%,#24272B 100%);
  background-size: 800px 100%;
  animation: shimmer 1.4s infinite linear;
  border-radius: .5rem;
}
@keyframes spin {
  from { transform:rotate(0deg); } to { transform:rotate(360deg); }
}
.spin { animation: spin .8s linear infinite; }
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}
.icon-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 0.5rem;
  padding: 0.35rem 0.55rem;
  color: #888;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: 'Outfit', sans-serif;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center;
}
.icon-btn:hover { background: rgba(255,255,255,0.09); color: #F3F1ED; }
.source-chip {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
  padding: 0.12rem 0.45rem; border-radius: 0.3rem;
  border: 1px solid;
}
.source-chip.live {
  background: rgba(76,175,80,0.12); color: #66BB6A;
  border-color: rgba(76,175,80,0.25);
}
.source-chip.sample {
  background: rgba(255,255,255,0.05); color: #666;
  border-color: rgba(255,255,255,0.1);
}
.test-btn {
  background: rgba(198,93,46,0.12);
  border: 1px solid rgba(198,93,46,0.25);
  border-radius: 0.5rem;
  padding: 0 0.75rem; height: 38px;
  color: #E07A45; font-size: 0.72rem; font-weight: 600;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  white-space: nowrap; flex-shrink: 0;
  transition: background 0.15s;
}
.test-btn:hover { background: rgba(198,93,46,0.2); }
.test-btn:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>
<div id="root" style="position:relative;z-index:1;"></div>

<script type="text/babel">

// ─── Local Storage Helpers ────────────────────────────────────────────────────

const STORAGE = {
  get: (key) => localStorage.getItem('trendz_' + key) || '',
  set: (key, val) => localStorage.setItem('trendz_' + key, val),
};

// ─── Data Fetchers ────────────────────────────────────────────────────────────

const PRODUCT_COLORS = ['#C65D2E','#E07A45','#A0522D','#B8621E','#D4693A','#8C3D1A'];

function generateSpark(base, points = 11) {
  return Array.from({length: points}, (_, i) =>
    base * (0.4 + (i / points) * 0.6 + (Math.random() - 0.3) * 0.12)
  );
}

function guessCategory(title) {
  const lower = title.toLowerCase();
  const map = [
    [/skin|serum|moistur|cleanser|toner|spf|sunscreen|retinol/, 'Skincare'],
    [/makeup|mascara|blush|concealer|lipstick|lip|foundation|eyeshadow/, 'Makeup'],
    [/hair|shampoo|conditioner|scalp|growth|dyson/, 'Hair Care'],
    [/stanley|water.bottle|hydrat|tumbler|cup/, 'Drinkware'],
    [/shoe|sneaker|sandal|boot|slipper/, 'Footwear'],
    [/dress|shirt|pants|jeans|outfit|top|skirt/, 'Fashion'],
    [/supplement|vitamin|protein|collagen|probiotic/, 'Wellness'],
    [/kitchen|cook|pan|pot|air.fry|blender/, 'Kitchen'],
    [/perfume|fragrance|cologne/, 'Fragrance'],
  ];
  for (const [re, cat] of map) if (re.test(lower)) return cat;
  return 'Trending';
}

function extractHashtags(title) {
  const stop = new Set(['this','that','with','from','have','been','they','their',
    'when','what','some','more','just','like','also','about','because','really',
    'bought','tiktok','made','after','seeing','tried']);
  return title.toLowerCase().split(/\s+/)
    .map(w => w.replace(/[^a-z]/g, ''))
    .filter(w => w.length > 4 && !stop.has(w))
    .slice(0, 3);
}

function cleanTitle(t) {
  return t
    .replace(/^(i\s+)?bought\s+/i, '')
    .replace(/\s+(because|after seeing|from|thanks to)\s+(of\s+)?tiktok.*/i, '')
    .replace(/^tiktok\s+made\s+me\s+buy\s+/i, '')
    .slice(0, 50).trim();
}

async function fetchRedditProducts() {
  const subs = ['TikTokMadeMeBuyIt','femalefashionadvice','SkincareAddiction'];
  const results = await Promise.allSettled(
    subs.map(s =>
      fetch(`https://www.reddit.com/r/${s}/top.json?t=week&limit=12&raw_json=1`)
        .then(r => r.json())
    )
  );
  const posts = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value.data?.children?.map(c => c.data) || [])
    .filter(p => p.score > 150 && !p.stickied);

  posts.sort((a, b) => b.score - a.score);
  return posts.slice(0, 6).map((p, i) => ({
    id: p.id,
    name: cleanTitle(p.title),
    category: guessCategory(p.title),
    color: PRODUCT_COLORS[i % PRODUCT_COLORS.length],
    views: p.score * 850 + p.num_comments * 300,
    mentions: p.num_comments,
    viralScore: Math.min(99, Math.round(Math.log10(p.score + 10) * 29)),
    convLift: Math.min(49, Math.round(Math.sqrt(p.score) / 4 + 5)),
    spark: generateSpark(p.score * 800, 11),
    tags: extractHashtags(p.title),
    sourceUrl: `https://reddit.com${p.permalink}`,
  }));
}

async function fetchRedditHashtags() {
  const res = await fetch(
    'https://www.reddit.com/r/TikTokMadeMeBuyIt/top.json?t=week&limit=50&raw_json=1'
  );
  const json = await res.json();
  const freq = {};
  json.data.children.forEach(c => {
    extractHashtags(c.data.title).forEach(w => { freq[w] = (freq[w] || 0) + 1; });
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20)
    .map(([w]) => w)
    .filter(Boolean);
}

async function fetchApifyTikTok(apiKey) {
  if (!apiKey) return null;
  const res = await fetch(
    `https://api.apify.com/v2/acts/clockworks~tiktok-hashtag-scraper/run-sync-get-dataset-items?token=${apiKey}&timeout=60`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        hashtags: ['viral','trending','grwm','haul','thatgirl'],
        resultsPerPage: 20,
      }),
    }
  );
  if (!res.ok) return null;
  const items = await res.json();
  if (!Array.isArray(items) || items.length === 0) return null;
  return items.slice(0, 6).map((item, i) => ({
    id: item.id || String(i),
    name: (item.text || 'TikTok Trending').slice(0, 50),
    category: 'TikTok',
    color: PRODUCT_COLORS[i % PRODUCT_COLORS.length],
    views: item.playCount || 0,
    mentions: item.diggCount || 0,
    viralScore: Math.min(99, Math.round(Math.log10((item.playCount || 1) + 1) * 15)),
    convLift: Math.min(49, Math.round((item.diggCount || 0) / 8000)),
    spark: generateSpark(item.playCount || 50000, 11),
    tags: (item.hashtags || []).slice(0, 3).map(h => h.name || h).filter(Boolean),
  }));
}

async function fetchFromBackend(path) {
  const base = STORAGE.get('backend').replace(/\/$/, '');
  if (!base) return null;
  const res = await fetch(`${base}${path}`);
  if (!res.ok) return null;
  return res.json();
}

// ─── Shared Components ────────────────────────────────────────────────────────

function KPICard({ label, value, sub, trend, accent }) {
  const [display, setDisplay] = React.useState(0);
  const trendUp = trend >= 0;

  React.useEffect(() => {
    const raw = parseFloat(String(value).replace(/[^0-9.]/g, ''));
    let start = 0;
    const steps = 40;
    const inc = raw / steps;
    let i = 0;
    const t = setInterval(() => {
      i++;
      start += inc;
      setDisplay(Math.min(start, raw));
      if (i >= steps) clearInterval(t);
    }, 18);
    return () => clearInterval(t);
  }, [value]);

  const fmt = (n) => {
    const prefix = String(value).startsWith('$') ? '$' : '';
    const suffix = String(value).endsWith('%') ? '%' : String(value).includes('k') ? 'k' : '';
    const base = suffix === 'k' ? n / 1000 : n;
    return prefix + (base >= 1000 && suffix !== 'k'
      ? base.toLocaleString('en-US', { maximumFractionDigits: 0 })
      : base.toFixed(suffix === '%' ? 1 : suffix === 'k' ? 1 : 0)) + suffix;
  };

  return (
    <div style={{
      background: '#24272B',
      border: '1px solid rgba(255,255,255,0.07)',
      borderRadius: '1rem',
      padding: '1.25rem 1.5rem',
      display: 'flex', flexDirection: 'column', gap: '0.5rem',
      minWidth: 0, position: 'relative', overflow: 'hidden',
    }}>
      {accent && <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '2px', background: 'linear-gradient(90deg, #C65D2E, transparent)' }} />}
      <span style={{ fontSize: '0.7rem', letterSpacing: '0.12em', textTransform: 'uppercase', color: '#B8B2AA', fontWeight: 600 }}>{label}</span>
      <span style={{ fontSize: '1.8rem', fontWeight: 700, color: '#F3F1ED', letterSpacing: '-0.03em', lineHeight: 1 }}>
        {fmt(display)}
      </span>
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
        <span style={{
          fontSize: '0.72rem', fontWeight: 600, padding: '0.1rem 0.4rem',
          borderRadius: '0.3rem',
          background: trendUp ? 'rgba(198,93,46,0.15)' : 'rgba(255,255,255,0.06)',
          color: trendUp ? '#E07A45' : '#888',
        }}>
          {trendUp ? '+' : ''}{trend}%
        </span>
        <span style={{ fontSize: '0.7rem', color: '#666' }}>{sub}</span>
      </div>
    </div>
  );
}

function SparkLine({ data, color = '#C65D2E', height = 32, width = 80 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(' ');
  const area = `M0,${height} L${pts.split(' ').join(' L')} L${width},${height} Z`;
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#sg-${color.replace('#','')})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function RevenueChart({ data }) {
  const W = 600, H = 180;
  const pad = { top: 16, right: 12, bottom: 32, left: 44 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;

  const maxV = Math.max(...data.map(d => d.v));
  const pts = data.map((d, i) => {
    const x = pad.left + (i / (data.length - 1)) * iW;
    const y = pad.top + iH - (d.v / maxV) * iH;
    return { x, y, ...d };
  });

  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
  const areaPath = `M${pts[0].x},${pad.top + iH} ${pts.map(p => `L${p.x},${p.y}`).join(' ')} L${pts[pts.length-1].x},${pad.top+iH} Z`;

  const [hover, setHover] = React.useState(null);

  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(t => ({
    v: t * maxV,
    y: pad.top + iH - t * iH,
  }));

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', overflow: 'visible' }}>
        <defs>
          <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#C65D2E" stopOpacity="0.22" />
            <stop offset="100%" stopColor="#C65D2E" stopOpacity="0" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        {yTicks.map((t, i) => (
          <g key={i}>
            <line x1={pad.left} y1={t.y} x2={W - pad.right} y2={t.y} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
            <text x={pad.left - 6} y={t.y + 4} textAnchor="end" fontSize="9" fill="#666" fontFamily="Outfit,sans-serif">
              ${(t.v / 1000).toFixed(0)}k
            </text>
          </g>
        ))}
        {pts.filter((_, i) => i % 3 === 0 || i === pts.length - 1).map((p, i) => (
          <text key={i} x={p.x} y={H - 4} textAnchor="middle" fontSize="9" fill="#555" fontFamily="Outfit,sans-serif">{p.label}</text>
        ))}
        <path d={areaPath} fill="url(#revGrad)" />
        <path d={linePath} fill="none" stroke="#C65D2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)" />
        {pts.map((p, i) => (
          <g key={i}
            onMouseEnter={() => setHover(p)}
            onMouseLeave={() => setHover(null)}
            style={{ cursor: 'default' }}
          >
            <circle cx={p.x} cy={p.y} r="12" fill="transparent" />
            {hover && hover === p && (
              <g>
                <circle cx={p.x} cy={p.y} r="4" fill="#C65D2E" />
                <circle cx={p.x} cy={p.y} r="7" fill="none" stroke="#C65D2E" strokeOpacity="0.4" strokeWidth="1.5" />
                <rect x={p.x - 34} y={p.y - 28} width="68" height="20" rx="4" fill="#2E3237" stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
                <text x={p.x} y={p.y - 14} textAnchor="middle" fontSize="10" fill="#F3F1ED" fontFamily="Outfit,sans-serif" fontWeight="600">
                  ${p.v.toLocaleString()}
                </text>
              </g>
            )}
          </g>
        ))}
      </svg>
    </div>
  );
}

function OrderFunnel({ stages }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', width: '100%' }}>
      {stages.map((s, i) => {
        const pct = (s.v / stages[0].v) * 100;
        return (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: '0.25rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: '0.72rem', color: '#B8B2AA', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500 }}>{s.label}</span>
              <span style={{ fontSize: '0.8rem', color: '#F3F1ED', fontWeight: 600 }}>{s.v.toLocaleString()}</span>
            </div>
            <div style={{ height: '6px', background: 'rgba(255,255,255,0.06)', borderRadius: '99px', overflow: 'hidden' }}>
              <div style={{
                height: '100%', borderRadius: '99px',
                width: `${pct}%`,
                background: i === 0 ? '#C65D2E' : `rgba(198,93,46,${1 - i * 0.18})`,
                transition: 'width 0.8s cubic-bezier(0.16,1,0.3,1)',
              }} />
            </div>
            {i < stages.length - 1 && (
              <div style={{ textAlign: 'right', fontSize: '0.65rem', color: '#555' }}>
                {((stages[i+1].v / s.v) * 100).toFixed(1)}% proceed
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function LiveTicker({ tags }) {
  const [offset, setOffset] = React.useState(0);
  const doubled = [...tags, ...tags];

  React.useEffect(() => {
    const t = setInterval(() => {
      setOffset(o => (o + 0.4) % (tags.length * 140));
    }, 16);
    return () => clearInterval(t);
  }, [tags.length]);

  return (
    <div style={{ overflow: 'hidden', width: '100%', position: 'relative' }}>
      <div style={{
        display: 'flex', gap: '0.5rem', alignItems: 'center',
        transform: `translateX(-${offset}px)`,
        whiteSpace: 'nowrap',
        willChange: 'transform',
      }}>
        {doubled.map((tag, i) => (
          <span key={i} style={{
            fontSize: '0.7rem', fontWeight: 600, letterSpacing: '0.04em',
            padding: '0.2rem 0.6rem',
            background: 'rgba(198,93,46,0.12)',
            border: '1px solid rgba(198,93,46,0.25)',
            borderRadius: '0.4rem',
            color: '#E07A45',
            flexShrink: 0,
          }}>#{tag}</span>
        ))}
      </div>
    </div>
  );
}

function TrendingProducts({ products }) {
  const [liveData, setLiveData] = React.useState(products);
  const [pulse, setPulse] = React.useState(null);

  React.useEffect(() => { setLiveData(products); }, [products]);

  React.useEffect(() => {
    const t = setInterval(() => {
      setLiveData(prev => prev.map(p => ({
        ...p,
        views: p.views + Math.floor(Math.random() * 12000 + 3000),
        mentions: p.mentions + Math.floor(Math.random() * 8 + 1),
        spark: [...p.spark.slice(1), p.spark[p.spark.length - 1] + (Math.random() - 0.3) * 5000],
      })));
      setPulse(Math.floor(Math.random() * products.length));
      setTimeout(() => setPulse(null), 600);
    }, 2800);
    return () => clearInterval(t);
  }, [products.length]);

  const fmtViews = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : (n / 1000).toFixed(0) + 'K';

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(210px, 1fr))', gap: '0.75rem' }}>
      {liveData.map((p, i) => (
        <div key={p.id} style={{
          background: '#2E3237',
          border: `1px solid ${pulse === i ? 'rgba(198,93,46,0.5)' : 'rgba(255,255,255,0.07)'}`,
          borderRadius: '0.875rem',
          padding: '1rem',
          display: 'flex', flexDirection: 'column', gap: '0.6rem',
          transition: 'border-color 0.3s ease',
          position: 'relative', overflow: 'hidden',
        }}>
          {i < 3 && (
            <div style={{
              position: 'absolute', top: '0.6rem', right: '0.6rem',
              fontSize: '0.6rem', fontWeight: 700, letterSpacing: '0.1em',
              padding: '0.15rem 0.4rem', borderRadius: '0.25rem',
              background: i === 0 ? '#C65D2E' : 'rgba(198,93,46,0.2)',

function TrafficSources({ sources }) {
  const total = sources.reduce((s, x) => s + x.v, 0);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
      {sources.map((s, i) => {
        const pct = (s.v / total * 100).toFixed(1);
        return (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: '0.25rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontSize: '0.75rem', color: '#B8B2AA', fontWeight: 500 }}>{s.label}</span>
              <span style={{ fontSize: '0.75rem', color: '#F3F1ED', fontWeight: 600 }}>{pct}%</span>
            </div>
            <div style={{ height: '5px', background: 'rgba(255,255,255,0.05)', borderRadius: '99px', overflow: 'hidden' }}>
              <div style={{
                height: '100%', width: `${pct}%`,
                background: s.label === 'TikTok' ? '#C65D2E' : `rgba(198,93,46,${0.5 - i * 0.08})`,
                borderRadius: '99px',
                transition: 'width 1s cubic-bezier(0.16,1,0.3,1)',
              }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Settings Modal ───────────────────────────────────────────────────────────

function SettingsModal({ onClose, onSave }) {
  const [apify, setApify]     = React.useState(STORAGE.get('apify'));
  const [backend, setBackend] = React.useState(STORAGE.get('backend'));
  const [testing, setTesting] = React.useState({});
  const [status, setStatus]   = React.useState({});

  const test = async (key, fn) => {
    setTesting(t => ({...t, [key]: true}));
    setStatus(s => ({...s, [key]: null}));
    try {
      const ok = await fn();
      setStatus(s => ({...s, [key]: ok ? 'ok' : 'fail'}));
    } catch {
      setStatus(s => ({...s, [key]: 'fail'}));
    }
    setTesting(t => ({...t, [key]: false}));
  };

  const testApify = () => test('apify', async () => {
    const r = await fetch(`https://api.apify.com/v2/users/me?token=${apify}`);
    return r.ok;
  });

  const testBackend = () => test('backend', async () => {
    const r = await fetch(`${backend.replace(/\/$/, '')}/api/health`);
    return r.ok;
  });

  const testReddit = () => test('reddit', async () => {
    const r = await fetch('https://www.reddit.com/r/TikTokMadeMeBuyIt/top.json?t=week&limit=1&raw_json=1');
    return r.ok;
  });

  const save = () => {
    STORAGE.set('apify', apify);
    STORAGE.set('backend', backend);
    onSave();
    onClose();
  };

  const StatusBadge = ({ k }) => {
    if (testing[k]) return <span style={{fontSize:'0.68rem',color:'#888'}}>testing…</span>;
    if (status[k] === 'ok')   return <span style={{fontSize:'0.68rem',color:'#4CAF50',fontWeight:600}}>✓ Connected</span>;
    if (status[k] === 'fail') return <span style={{fontSize:'0.68rem',color:'#ef5350',fontWeight:600}}>✗ Failed</span>;
    return null;
  };

  const sourceRow = (label, desc, onTest, testKey, alwaysActive = false) => (
    <div style={{
      padding: '0.9rem 1rem',
      background: 'rgba(255,255,255,0.03)',
      borderRadius: '0.75rem',
      border: '1px solid rgba(255,255,255,0.07)',
      display: 'flex', flexDirection: 'column', gap: '0.4rem',
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'0.82rem',fontWeight:600}}>{label}</span>
        <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
          <StatusBadge k={testKey} />
          {alwaysActive
            ? <span className="source-chip live">ACTIVE</span>
            : <button className="test-btn" onClick={onTest} disabled={testing[testKey]}>Test</button>
          }
        </div>
      </div>
      <p style={{fontSize:'0.7rem',color:'#666'}}>{desc}</p>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#24272B',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: '1.25rem',
        padding: '2rem',
        width: '100%', maxWidth: '500px',
        display: 'flex', flexDirection: 'column', gap: '1.25rem',
        maxHeight: '90dvh', overflowY: 'auto',
      }}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:'1rem'}}>Data Sources</div>
            <div style={{fontSize:'0.7rem',color:'#666',marginTop:'0.2rem'}}>Configure live trend feeds</div>
          </div>
          <button onClick={onClose} className="icon-btn" style={{fontSize:'1rem'}}>✕</button>
        </div>

        {/* Reddit - free, always works */}
        {sourceRow(
          'Reddit (r/TikTokMadeMeBuyIt)',
          'Free • No key required • Pulls top weekly posts across 3 viral product subreddits',
          testReddit, 'reddit', false
        )}

        {/* Apify */}
        <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
          <label style={{fontSize:'0.75rem',color:'#B8B2AA',fontWeight:600}}>
            Apify API Key
            <span style={{color:'#555',fontWeight:400'}}> — TikTok hashtag scraper</span>
          </label>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <input
              className="field-input"
              type="password"
              placeholder="apify_api_xxxxxxxxxxxxxxxxxxxx"
              value={apify}
              onChange={e => setApify(e.target.value)}
            />
            <button className="test-btn" onClick={testApify} disabled={!apify||testing.apify}>
              {testing.apify ? '…' : status.apify === 'ok' ? '✓' : status.apify === 'fail' ? '✗' : 'Test'}
            </button>
          </div>
          <p style={{fontSize:'0.7rem',color:'#555'}}>
            Free account at apify.com → ~$0.004/run. When set, overrides Reddit trends with real TikTok data.
          </p>
        </div>

        {/* Backend URL */}
        <div style={{display:'flex',flexDirection:'column',gap:'0.5rem'}}>
          <label style={{fontSize:'0.75rem',color:'#B8B2AA',fontWeight:600}}>
            Backend URL
            <span style={{color:'#555',fontWeight:400}}> — Pinterest • Google Trends • Amazon</span>
          </label>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <input
              className="field-input"
              type="text"
              placeholder="http://localhost:3001"
              value={backend}
              onChange={e => setBackend(e.target.value)}
            />
            <button className="test-btn" onClick={testBackend} disabled={!backend||testing.backend}>
              {testing.backend ? '…' : status.backend === 'ok' ? '✓' : status.backend === 'fail' ? '✗' : 'Test'}
            </button>
          </div>
          <p style={{fontSize:'0.7rem',color:'#555'}}>
            Run <code style={{background:'rgba(255,255,255,0.07)',padding:'0 0.25rem',borderRadius:'0.25rem'}}>node server.js</code> locally or deploy to Railway / Render / Cloudflare Workers.
          </p>
        </div>

        {/* Backend sources info */}
        <div style={{
          padding: '0.75rem 1rem',
          background: 'rgba(255,255,255,0.02)',
          borderRadius: '0.75rem',
          border: '1px solid rgba(255,255,255,0.05)',
          display: 'flex', flexDirection: 'column', gap: '0.4rem',
        }}>
          <span style={{fontSize:'0.72rem',fontWeight:600,color:'#B8B2AA'}}>Backend unlocks</span>
          {[
            ['Pinterest Trends', 'free dev API — 3-6 months leading indicator'],
            ['Google Trends',    'pytrends equivalent — confirms broader intent'],
            ['Amazon Movers',    'hourly sales velocity — purchase confirmation'],
          ].map(([name, desc]) => (
            <div key={name} style={{display:'flex',gap:'0.5rem',alignItems:'baseline'}}>
              <span style={{fontSize:'0.7rem',color:'#666'}}>→</span>
              <span style={{fontSize:'0.72rem',color:'#888'}}><span style={{color:'#B8B2AA',fontWeight:500}}>{name}</span> — {desc}</span>
            </div>
          ))}
        </div>

        <button onClick={save} style={{
          background: 'linear-gradient(135deg, #C65D2E, #8C3D1A)',
          border: 'none', borderRadius: '0.75rem',
          padding: '0.75rem', color: '#F3F1ED',
          fontSize: '0.85rem', fontWeight: 700, cursor: 'pointer',
          fontFamily: 'Outfit, sans-serif',
          transition: 'opacity 0.15s',
        }}>Save & Refresh Data</button>
      </div>
    </div>
  );
}

        <div key={i} style={{background:'#2E3237',borderRadius:'0.875rem',padding:'1rem',display:'flex',flexDirection:'column',gap:'0.6rem'}}>
          <div className="skeleton" style={{height:'90px',borderRadius:'0.5rem'}}/>
          <div className="skeleton" style={{height:'14px',width:'80%'}}/>
          <div className="skeleton" style={{height:'10px',width:'50%'}}/>
          <div className="skeleton" style={{height:'36px'}}/>
        </div>
      ))}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [activeTab,       setActiveTab]       = React.useState('Overview');
  const [showSettings,    setShowSettings]    = React.useState(false);
  const [trendingProducts,setTrendingProducts]= React.useState(SAMPLE_TRENDING);
  const [tickerTags,      setTickerTags]      = React.useState(SAMPLE_TAGS);
  const [loading,         setLoading]         = React.useState(true);
  const [dataSources,     setDataSources]     = React.useState({reddit:false,apify:false,backend:false});

  const loadData = React.useCallback(async () => {
    setLoading(true);
    const sources = { reddit: false, apify: false, backend: false };

    // Try Apify first (richer TikTok data) if key is configured
    const apifyKey = STORAGE.get('apify');
    if (apifyKey) {
      try {
        const apifyProducts = await fetchApifyTikTok(apifyKey);
        if (apifyProducts && apifyProducts.length > 0) {
          setTrendingProducts(apifyProducts);
          sources.apify = true;
        }
      } catch { /* fall through */ }
    }

    // Reddit — always attempt (free, no key)
    try {
      const [products, hashtags] = await Promise.all([
        fetchRedditProducts(),
        fetchRedditHashtags(),
      ]);
      if (products.length > 0 && !sources.apify) {
        setTrendingProducts(products);
      }
      if (hashtags.length > 0) {
        setTickerTags(hashtags);
      }
      sources.reddit = products.length > 0;
    } catch { /* fall through to sample data */ }

    // Backend sources (Pinterest, Google Trends, Amazon) if configured
    const backendBase = STORAGE.get('backend');
    if (backendBase) {
      try {
        const health = await fetch(`${backendBase.replace(/\/$/, '')}/api/health`);
        sources.backend = health.ok;
      } catch { /* backend not reachable */ }
    }

    setDataSources(sources);
    setLoading(false);
  }, []);

  React.useEffect(() => { loadData(); }, [loadData]);

  const tabs = {
    Overview:  () => <OverviewTab  trendingProducts={trendingProducts} tickerTags={tickerTags} dataSources={dataSources} />,
    Trending:  () => <TrendingTab  trendingProducts={trendingProducts} tickerTags={tickerTags} loading={loading} dataSources={dataSources} />,
    Products:  () => <ProductsTab />,
    Analytics: () => <AnalyticsTab />,
  };
  const ActiveView = tabs[activeTab] || tabs.Overview;

  return (
    <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column' }}>
      <Nav
        activeTab={activeTab}
        setActiveTab={setActiveTab}
        onSettings={() => setShowSettings(true)}
        dataSources={dataSources}
      />
      <main style={{ flex: 1, padding: '1.5rem 2rem 3rem', maxWidth: '1400px', width: '100%', margin: '0 auto' }}>
        <ActiveView />
      </main>
      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          onSave={loadData}
        />
      )}
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
